query EventScan($first: Int) {
  domainEvents(first: $first, orderBy: blockNumber, orderDirection: desc) {
    id
    __typename
    blockNumber
    transactionID
    domain {
      id
      name
    }
  }
  registrationEvents(first: $first, orderBy: blockNumber, orderDirection: desc) {
    id
    __typename
    blockNumber
    transactionID
    registration {
      id
      labelName
    }
  }
  resolverEvents(first: $first, orderBy: blockNumber, orderDirection: desc) {
    id
    __typename
    blockNumber
    transactionID
    resolver {
      id
      address
    }
  }
}
