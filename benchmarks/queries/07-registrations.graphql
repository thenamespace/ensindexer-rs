query Registrations($labels: [String!], $expiry: String!, $first: Int) {
  registrations(
    first: $first
    orderBy: expiryDate
    orderDirection: desc
    where: { labelName_in: $labels, expiryDate_gt: $expiry }
  ) {
    id
    labelName
    registrationDate
    expiryDate
    cost
    registrant {
      id
    }
    domain {
      id
      name
      owner {
        id
      }
    }
    events(first: 25) {
      id
      blockNumber
      transactionID
      ... on NameRegistered {
        registrant {
          id
        }
        expiryDate
      }
      ... on NameRenewed {
        expiryDate
      }
      ... on NameTransferred {
        newOwner {
          id
        }
      }
    }
  }
}
