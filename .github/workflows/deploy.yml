---
name: Deploy Production

on:
    workflow_dispatch:

jobs:
    build-and-push:
        uses: thenamespace/.github/.github/workflows/gcp-oidc-docker-build-push.yaml@main
        permissions:
            contents: read
            id-token: write
        with:
            project_id: prod-9427
            region: europe-west3
            workload_identity_provider: projects/397196751430/locations/global/workloadIdentityPools/github-pool/providers/github-provider
    update-prod:
        needs: build-and-push
        uses: ./.github/workflows/dispatch.yml
        secrets: inherit
        with:
            environment: prod
